name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + dev)
        run: pip install -e ".[dev]"

      - name: Unit tests (pytest)
        run: pytest -q

      - name: Scope taxonomy consistency (check_scope.py)
        run: python check_scope.py

      - name: Evaluation regression (self-search / perturbation / threshold)
        # ngspice/LLM 不要のセクション(1,3,4)のみ。hard failure で exit 1。
        run: python evaluate.py

      - name: Lint (ruff, informational)
        continue-on-error: true
        run: ruff check .
