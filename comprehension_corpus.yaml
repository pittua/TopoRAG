# comprehension_corpus.yaml — netlist 読解/理解 能力テストの正解シート
# 仕様: TEST_SPEC_netlist_comprehension.md (§13-3 / §14)
#
# 採点規則:
#   grade: regex   … check = [[alt,alt],[alt]] の AND-of-OR を回答スライスに正規表現照合(IGNORECASE)
#                    数値は境界つき (例 (?<!\d)1(?!\d)) で 13k が 3k に誤マッチしないようにする
#   grade: abstain … H(罠)。accept_abstain のいずれかを明言した時のみ正解。
#                    数値/値を断定したら捏造(hallucination)として別計上。
#   grade: rubric  … R/N(開放)。rubric_points の充足数で 0/1/2、forbidden を含めば 0。judge採点。
#
# v2: ブロック … V2撹乱バリアントでの上書き(変わる質問のみ)。memory_trap = 教科書的誤答トークン(§8)。
# accept パターンは生ノード名に依存させない(V1 で relabel されるため)。役割語・値・個数・トポロジー名で照合。

rc_lowpass_001:
  - id: P1
    dim: P
    q: "抵抗(R)とコンデンサ(C)はそれぞれ何個あるか。"
    grade: regex
    check: [['(?<!\d)1(?!\d)|一個|1個|1つ']]
  - id: T1
    dim: T
    q: "この回路はローパスフィルタかハイパスフィルタか。"
    grade: regex
    check: [['ローパス', 'low-?pass', '低域(通過|ろ波)?', 'LPF']]
    v2:
      check: [['ハイパス', 'high-?pass', '高域(通過|ろ波)?', 'HPF']]
      memory_trap: ['ローパス', 'low-?pass', '低域', 'LPF']
  - id: T2
    dim: T
    q: "入力と出力の間に直列に挿入されている部品の種類は何か(抵抗かコンデンサか)。"
    grade: regex
    check: [['抵抗', 'resistor', '\bR\b', 'R1']]
    v2:
      check: [['コンデンサ', 'capacitor', 'キャパシタ', '\bC\b', 'C1']]
      memory_trap: []
  - id: Q1
    dim: Q
    q: "カットオフ周波数を概算せよ(Hz)。"
    grade: regex
    check: [['159[0-9]', '1\.5[0-9]\s*k', '1\.6\s*k', '160[0-9]', '150[0-9]', '約\s*1\.[56]', '1\.6\s*kHz', '1\.5\s*kHz']]
  - id: R1
    dim: R
    q: "この回路全体の役割(機能)を説明せよ。"
    grade: rubric
    rubric_points:
      - "低い周波数を通し高い周波数を減衰させる(低域通過)"
      - "高周波をGNDへ逃がす/平滑・積分として働く"
    forbidden: ["高域を通す", "ハイパス", "高周波を通過"]
    v2:
      rubric_points:
        - "高い周波数を通し低い周波数を減衰させる(高域通過)"
        - "直流/低周波を阻止し交流を結合する"
      forbidden: ["低域を通す", "ローパス", "低周波を通過"]
  - id: N1
    dim: N
    q: "コンデンサを取り除く(開放する)と周波数特性はどう変わるか。"
    grade: rubric
    rubric_points:
      - "フィルタ作用が失われる/周波数依存がなくなる"
      - "出力は入力にほぼ追従する(全周波数素通り、または分圧のみ)"
    forbidden: []
  - id: H1
    dim: H
    q: "この回路のインダクタ(コイル)のインダクタンス値はいくらか。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', '含まれ(て|ない)', 'インダクタは(無|な)', '記載(が|は)?(無|な)']

ce_amp_npn_001:
  - id: P1
    dim: P
    q: "トランジスタ(NPN/PNP)は合計何個あるか。"
    grade: regex
    check: [['(?<!\d)1(?!\d)|一個|1個|1つ']]
  - id: T1
    dim: T
    q: "この増幅段の構成は CE(接地エミッタ)/CB(ベース接地)/CC(コレクタ接地) のどれか。"
    grade: regex
    check: [['接地エミッタ', 'エミッタ接地', 'common-?emitter', '\bCE\b', 'コモンエミッタ']]
  - id: T2
    dim: T
    q: "この回路に直列帰還(エミッタ縮退)はあるか。あるならどの素子によるか。"
    grade: regex
    check: [['縮退', '直列帰還', 'エミッタ抵抗', 'Re\b', 'デジェネ']]
    v2:
      check: [['(無|な)い', 'ない', '存在しない', '縮退(は|が)?(無|な)', '帰還(は|が)?(無|な)']]
      memory_trap: ['縮退あり', 'エミッタ縮退がある']
  - id: Q1
    dim: Q
    q: "小信号電圧利得の大きさを概算せよ。"
    grade: regex
    check: [['4\.[5-8]', '約\s*5', '5\s*倍', '4\s*倍', '×\s*5', 'x\s*5', '4\s*[〜~-]\s*5', '(?<!\d)5(?!\d)\s*程度']]
    v2:
      grade: abstain
      accept_abstain: ['判定不能', 'gm', '相互コンダクタンス', '大き(い|く)', '定まらない', '決まらない', '不明']
  - id: R1
    dim: R
    q: "抵抗 Re(エミッタ側に接続された抵抗)の、この回路での役割は何か。"
    grade: rubric
    rubric_points:
      - "エミッタ縮退/直列帰還をかける"
      - "動作点(バイアス)を温度変化に対し安定化する"
      - "電圧利得を概ね Rc/Re で設定する"
    forbidden: ["入力結合", "出力負荷", "カップリング"]
    v2:
      rubric_points:
        - "コレクタ側の負荷抵抗として働く"
        - "出力電圧を取り出す/電流電圧変換する"
      forbidden: ["エミッタ縮退", "直列帰還", "縮退"]
  - id: N1
    dim: N
    q: "入力の結合コンデンサ Cin を短絡(ショート)したら動作はどう変わるか。"
    grade: rubric
    rubric_points:
      - "前段/入力源の直流がベースに直接混入する"
      - "分圧バイアスが崩れ動作点(Q点)がずれる/飽和・遮断しうる"
    forbidden: []
  - id: H1
    dim: H
    q: "出力に接続された負荷コンデンサの値はいくらか。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', '負荷コンデンサは(無|な)', '記載(が|は)?(無|な)', '出力に(は)?コンデンサ(は)?(無|な)']

diff_pair_npn_001:
  - id: P1
    dim: P
    q: "トランジスタは合計何個あるか。"
    grade: regex
    check: [['(?<!\d)2(?!\d)|二個|2個|2つ|二つ']]
  - id: T1
    dim: T
    q: "このトポロジーの名称は何か。"
    grade: regex
    check: [['差動', 'ロングテール', 'long-?tail', 'differential', 'エミッタ結合', 'diff(erential)?\s*pair']]
    v2:
      check: [['差動で(は)?ない', '差動ではない', '(非|不)対称', '共通(エミッタ|テール)で(は)?ない', 'シングルエンド', '差動対が(壊|崩)']]
      memory_trap: ['差動', 'differential', 'ロングテール', 'long-?tail', 'エミッタ結合']
  - id: T2
    dim: T
    q: "Q1 と Q2 はどの端子を共通ノードに接続しているか。"
    grade: regex
    check: [['エミッタ', 'emitter', 'テール', 'tail']]
    v2:
      check: [['共通で(は)?ない', '共通(化)?されて(い)?ない', '(片側|一方)(だけ|のみ)?(が)?GND', 'GND(へ|に)直結', '別々']]
      memory_trap: ['エミッタを共通', '共通エミッタ', 'テールで結合']
  - id: Q1
    dim: Q
    q: "テール抵抗(共通エミッタとGNDの間の抵抗)の値はいくらか。"
    grade: regex
    check: [['(?<!\d)10\s*k', '10\s*kΩ', '10000', '10\s*キロ']]
  - id: R1
    dim: R
    q: "テール抵抗(共通エミッタ→GND の抵抗)の、この回路での役割は何か。"
    grade: rubric
    rubric_points:
      - "テール電流(共通の尾部電流)を設定する/電流源的に働く"
      - "同相(コモンモード)を抑制し差動動作を成立させる"
    forbidden: ["入力結合", "出力負荷"]
    v2: {skip: true}   # V2では片側エミッタGND直結で差動が壊れ、テール役割の前提が崩れるため除外
  - id: N1
    dim: N
    q: "2本のコレクタ抵抗 Rc1,Rc2 の値が互いに違っていたら、出力にどんな影響が出るか。"
    grade: rubric
    rubric_points:
      - "差動の対称性が崩れる"
      - "出力オフセット/利得の非対称が生じる"
    forbidden: []
  - id: H1
    dim: H
    q: "この回路の負荷インダクタの値はいくらか。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', 'インダクタは(無|な)', '記載(が|は)?(無|な)']

cascode_npn_001:
  - id: P1
    dim: P
    q: "トランジスタは合計何個あるか。"
    grade: regex
    check: [['(?<!\d)2(?!\d)|二個|2個|2つ|二つ']]
  - id: T1
    dim: T
    q: "このトポロジーの名称は何か。"
    grade: regex
    check: [['カスコード', 'cascode']]
    v2:
      check: [['カスコードで(は)?ない', 'カスコードではない', '(2|二)段(の)?(縦)?(続|積)', '別構成', 'カスコードとは(言|い)えない']]
      memory_trap: ['カスコード', 'cascode']
  - id: T2
    dim: T
    q: "上段トランジスタ Q2 の構成は CE/CB/CC のどれか。"
    grade: regex
    check: [['ベース接地', '共通ベース', 'common-?base', '\bCB\b', 'コモンベース']]
    v2:
      check: [['ベース接地で(は)?ない', '接地エミッタ', 'エミッタ接地', '\bCE\b', 'CB で(は)?ない', '共通ベースで(は)?ない']]
      memory_trap: ['ベース接地', '共通ベース', 'common-?base', '\bCB\b']
  - id: Q1
    dim: Q
    q: "下段(Q1)のエミッタ縮退を考慮した電圧利得を Rc/Re で概算せよ。"
    grade: regex
    check: [['4\.[5-8]', '約\s*5', '5\s*倍', '4\s*倍', '4\s*[〜~-]\s*5']]
  - id: R1
    dim: R
    q: "上段トランジスタ Q2(縦積みの上側)の、この回路での役割は何か。"
    grade: rubric
    rubric_points:
      - "ミラー効果を抑え高域特性/帯域を改善する"
      - "出力抵抗を高め利得を確保する/下段のコレクタ電圧を一定に保つ"
    forbidden: ["入力結合", "電源平滑"]
    v2: {skip: true}   # V2ではQ2ベースが入力駆動になりカスコードでなくなるため役割の前提が崩れる→除外
  - id: N1
    dim: N
    q: "Q2 のベースに付く分圧抵抗 Rb1,Rb2 の役割は何か。"
    grade: rubric
    rubric_points:
      - "Q2 のベースを一定の直流電圧にバイアスする"
      - "カスコードの動作点(上段の動作点)を決める"
    forbidden: ["信号入力", "出力負荷"]
    v2: {skip: true}   # V2ではQ2ベースが入力直結となり分圧バイアスの前提が崩れる→除外
  - id: H1
    dim: H
    q: "この回路の出力段エミッタフォロワに使われているトランジスタは何個か。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', 'エミッタフォロワは(無|な)', '出力段(は)?(無|な)', 'そのような段は(無|な)']

mfb_bpf_001:
  - id: P1
    dim: P
    q: "オペアンプ(OpAmp)とコンデンサはそれぞれ何個あるか。"
    grade: regex
    check: [['オペアンプ.{0,6}(?<!\d)1(?!\d)|opamp.{0,6}1|(?<!\d)1(?!\d).{0,6}(オペアンプ|opamp)'], ['コンデンサ.{0,6}(?<!\d)2(?!\d)|(?<!\d)2(?!\d).{0,6}(個|つ).{0,6}(コンデンサ|キャパシタ|capacitor)|capacitor.{0,6}2']]
  - id: T1
    dim: T
    q: "この能動フィルタの種別は何か(LPF/HPF/BPF/BSF)。"
    grade: regex
    check: [['バンドパス', '帯域通過', 'band-?pass', '\bBPF\b', '帯域ろ波']]
    v2:
      check: [['フィルタで(は)?ない', '帰還(が|は)?(無|な)', '積分器', '飽和', '開ループ', 'バンドパスで(は)?ない', 'BPFで(は)?ない']]
      memory_trap: ['バンドパス', '帯域通過', 'band-?pass', '\bBPF\b']
  - id: T2
    dim: T
    q: "出力から反転入力(in_n)へ戻る帰還を作っている素子はどれか。"
    grade: regex
    check: [['Rf\b', '100\s*k', '帰還抵抗', '帰還(用)?の?抵抗']]
    v2:
      check: [['(無|な)い', 'ない', '帰還(は|が)?(無|な)', '存在しない', '戻る(素子|経路)(は)?(無|な)', '抵抗(に|の)?よる帰還(は)?(無|な)', 'コンデンサ(を|経由)', 'C[12]\b']]
      memory_trap: ['Rf', '帰還抵抗(が|は)?ある']
  - id: Q1
    dim: Q
    q: "帰還抵抗 Rf と入力抵抗 R1 の比 Rf/R1 はいくらか。"
    grade: regex
    check: [['(?<!\d)10(?!\d)|十倍|10\s*倍|×\s*10|x\s*10']]
    v2:
      grade: abstain
      accept_abstain: ['判定不能', 'Rf(が|は)?(無|な)', '帰還抵抗が(無|な)', '比は(定義|計算)でき', '存在しない']
  - id: R1
    dim: R
    q: "オペアンプの非反転入力(in_p)が GND に接続されていることの役割は何か。"
    grade: rubric
    rubric_points:
      - "仮想接地の基準電位/DC基準を与える"
      - "反転(積分)構成の基準点として働く"
    forbidden: ["信号入力", "出力"]
  - id: N1
    dim: N
    q: "帰還抵抗 Rf を開放(除去)したら、この回路はどうなるか。"
    grade: rubric
    rubric_points:
      - "直流帰還が無くなり開ループ/積分器的になる"
      - "出力が飽和/発散し、バンドパスフィルタとして機能しなくなる"
    forbidden: []
    v2: {skip: true}   # V2はまさにRf除去後の回路。反実仮想質問が二重になるため除外
  - id: H1
    dim: H
    q: "この能動フィルタに使われているインダクタの値はいくらか。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', 'インダクタは(無|な)', '能動フィルタ(なので|のため).{0,8}(無|な)', '記載(が|は)?(無|な)']

# 大規模(回路6): chain_ce_20 (生成・V1相当・不透明)。dims P,P,T,T,Q,H = 6問。
# accept は gen_chain(20) の真値で固定(段数20→NPN20/抵抗80、3段目Re=3k、20段偶数→非反転)。
chain_ce_20:
  - id: P1
    dim: P
    q: "NPNトランジスタは何個あるか。"
    grade: regex
    check: [['(?<!\d)20(?!\d)|二十']]
  - id: P2
    dim: P
    q: "抵抗(R)は全部で何個あるか。"
    grade: regex
    check: [['(?<!\d)80(?!\d)|八十']]
  - id: T1
    dim: T
    q: "入力ポート VIN から、結合コンデンサ→トランジスタ→段間結合…と信号経路を順にたどり、入力から数えて3番目のトランジスタの、エミッタとGNDの間に入っている抵抗の値はいくつか。"
    grade: regex
    check: [['(?<!\d)3\s*k']]
  - id: T2
    dim: T
    q: "各増幅段は信号を反転させる。全体として入力に対し最終出力は反転か非反転か。"
    grade: regex
    check: [['非反転', '同相', '正転', '反転しない']]
  - id: Q1
    dim: Q
    q: "各段の電圧利得が約4.7倍のとき、連続する2段分の利得の概算はいくらか。"
    grade: regex
    check: [['(?<!\d)2[0-4](?!\d)', '4\.7\s*[\^²]', '4\.7\s*×\s*4\.7', '二乗', '約\s*22']]
  - id: H1
    dim: H
    q: "入力から数えて21番目の増幅段のエミッタ抵抗の値はいくらか。"
    grade: abstain
    accept_abstain: ['判定不能', '存在しない', '無い', 'ない', '20段(しか|まで)', '21(段|番)目は(無|な)', '段数(は)?20', '20段(なので|のため)']
